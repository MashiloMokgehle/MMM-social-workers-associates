<!DOCTYPE html>
<html>
<head>

<title>Book Appointment | MMM Social Workers</title>

<style>

body{
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:20px;
background:#f4f6f8;
}

h1{
color:#2f6f6a;
}

form{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input, select, textarea{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
}

button{
background:#2f6f6a;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Book An Appointment</h1>

<p>
Complete the form below and our team will contact you.
</p>

<form>

<label>Full Name</label>
<input type="text">

<label>Phone Number</label>
<input type="text">

<label>Email Address</label>
<input type="email">

<label>Select Service</label>

<select>

<option>Child, Family & Disability Counselling</option>

<option>Substance Abuse & Addiction Counselling</option>

<option>Mediation & Divorce Support</option>

<option>Employee Wellness Support</option>

<option>Bereavement Counselling</option>

<option>Trauma Counselling</option>

</select>

<label>Preferred Date</label>

<input type="date">

<label>Additional Notes</label>

<textarea rows="6"></textarea>

<button type="submit">
Submit Booking Request
</button>

</form>

<br>

<a href="index.html">
Back Home
</a>

</body>
</html>
