<!DOCTYPE html>
<html>
<head>
<title>Book Consultation | MMM Social Workers & Associates</title>

<style>

body{
background-color:#f2f8f5;
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:30px;
line-height:1.6;
}

.form-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

input, select, textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
background:#2d7f73;
color:white;
padding:12px 25px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#25695f;
}

.back-btn{
display:inline-block;
margin-top:20px;
padding:10px 20px;
background:#2d7f73;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<div class="form-box">

<h1>Book a Consultation</h1>

<p>
Complete the form below and our team will contact you to confirm your appointment.
</p>

<form action="https://formsubmit.co/info@mmmsocialworkersandassociates.co.za" method="POST">

<input type="hidden" name="_subject" value="New Booking Request - MMM Social Workers">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="https://mmmsocialworkersandassociates.co.za/thankyou.html">>

<label>Full Name</label>
<input type="text" required>

<label>Email Address</label>
<input type="email" required>

<label>Phone Number</label>
<input type="tel" required>

<label>Select Service</label>

<select required>
<option value="">Choose a Service</option>
<option>Trauma Counselling</option>
<option>Child, Family & Disability Counselling</option>
<option>Occupational Therapy</option>
<option>Substance Abuse & Addiction Counselling</option>
<option>Mediation & Divorce Support</option>
<option>Bereavement Counselling</option>
<option>Employee Wellness Support</option>
</select>

<label>Preferred Appointment Date</label>
<input type="date" required>

<label>Preferred Time</label>
<input type="time">

<label>Additional Information</label>

<textarea rows="5"
placeholder="Please provide any additional information that may assist us."></textarea>

<button type="submit">Submit Booking Request</button>

</form>

<a href="index.html" class="back-btn">Back Home</a>

</div>

</body>
</html>
